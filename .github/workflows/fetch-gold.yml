name: Fetch Gold Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data and push (with retry on race)
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          success=false
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main
            python fetch_market_data.py gold
            touch data/signal_log.jsonl
            git add data/latest.json data/signal_log.jsonl
            if git diff --staged --quiet; then
              echo "No changes to commit"
              success=true
              break
            fi
            git commit -m "Update gold data"
            if git push origin main; then
              echo "Push succeeded"
              success=true
              break
            else
              echo "Push failed, retrying (attempt $attempt)..."
              git fetch origin main
              git reset --hard origin/main
              sleep $((RANDOM % 8 + 3))
            fi
          done
          if [ "$success" = false ]; then
            echo "::error::Failed to push gold data after all retry attempts"
            exit 1
          fi