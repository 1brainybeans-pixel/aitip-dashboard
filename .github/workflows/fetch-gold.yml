name: Fetch Gold Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch gold data
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python fetch_market_data.py gold

      - name: Commit and push (with retry)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          touch data/signal_log.jsonl
          git add data/gold.json data/signal_log.jsonl
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update gold data"
          success=false
          for attempt in 1 2 3 4 5; do
            if git push origin main; then
              echo "Push succeeded"
              success=true
              break
            else
              echo "Push failed, pulling and retrying (attempt $attempt)..."
              git pull --rebase origin main
              sleep $((RANDOM % 8 + 3))
            fi
          done
          if [ "$success" = false ]; then
            echo "::error::Failed to push gold data after all retry attempts"
            exit 1
          fi