name: Fetch Crypto Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data and push (with retry on race)
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            python fetch_market_data.py crypto
            git add data/latest.json data/signal_log.jsonl
            if git diff --staged --quiet; then
              echo "No changes to commit"
              break
            fi
            git commit -m "Update crypto data"
            if git push origin main; then
              echo "Push succeeded"
              break
            else
              echo "Push failed, retrying (likely race with gold workflow)..."
              git fetch origin main
              git reset --hard origin/main
              sleep 5
            fi
          done